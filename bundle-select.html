    body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--espresso); -webkit-font-smoothing: antialiased; }

    nav {
      padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center;
      background: var(--cream); border-bottom: 1px solid rgba(196,162,101,0.2);
    }
    .nav-brand {
      font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 500;

      font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 600;

    .bundle-header p {
      font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: #6a5a4a;
    }

    .selection-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--espresso); color: var(--white); padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .selection-count {
      font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 500;

    }

    .submit-selections {
      font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--espresso);
      background: var(--gold); border: none; padding: 0.7rem 2rem; cursor: pointer;
      transition: background 0.3s; opacity: 0.4; pointer-events: none;
    }
    .submit-selections.ready { opacity: 1; pointer-events: auto; }
    .submit-selections:hover { background: var(--gold-light); }

    .pick-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 2rem;
    }
    .pick-card {
      position: relative; cursor: pointer; overflow: hidden;
      border: 3px solid transparent; transition: all 0.3s;
      background: var(--white);
    }
    .pick-card.selected { border-color: var(--gold); }
    .pick-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
    .pick-card-check {
      position: absolute; top: 0.6rem; right: 0.6rem;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .pick-card.selected .pick-card-check {
      background: var(--gold); border-color: var(--gold);
    }
    .pick-card-check svg { opacity: 0; transition: opacity 0.3s; }
    .pick-card.selected .pick-card-check svg { opacity: 1; }
    .pick-card-name {
      padding: 0.6rem; font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; text-align: center;
    }

    .email-prompt {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    .email-prompt.show { display: flex; }
    .email-prompt-card {
      background: var(--white); padding: 3rem; max-width: 450px; width: 90%;
      text-align: center;
    }
    .email-prompt-card h2 {
      font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1rem;
    }
    .email-prompt-card p {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: #6a5a4a;
      margin-bottom: 1.5rem;
    }
    .email-prompt-card input {
      width: 100%; padding: 0.9rem; border: 1px solid var(--cream-dark);
      font-family: 'Montserrat', sans-serif; font-size: 0.8rem; margin-bottom: 1rem;
      outline: none;
    }
    .email-prompt-card input:focus { border-color: var(--gold); }
    .email-prompt-card button {
      width: 100%; padding: 1rem; font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--espresso); background: var(--gold);
      border: none; cursor: pointer;
    }
    .success-msg {
      font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;

    }

    footer {
      background: var(--charcoal); padding: 2.5rem 3rem; text-align: center;

      color: rgba(255,255,255,0.25); letter-spacing: 0.1em;
    }
    footer a { color: var(--gold); text-decoration: none; }

    @media (max-width: 768px) {
      .pick-grid { grid-template-columns: repeat(3, 1fr); gap: 0.6rem; padding: 1rem; }
      nav { padding: 1rem 1.5rem; }
    }
  </style>
</head>

        card.classList.add('selected');
      }
      updateCount();
    }
